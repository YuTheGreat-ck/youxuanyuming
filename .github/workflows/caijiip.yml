name: Update IP List

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update-ip-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 关键权限

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}   # 使用内置 Token

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Collect IPs
      run: python collect_ips.py

    - name: Commit ip.txt if changed
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: auto update ip.txt"
        file_pattern: ip.txt
